<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Carrito de compras - TechStore" />
    <title>Carrito de Compras - TechStore</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23ff6b35'/%3E%3Ctext x='50' y='65' font-size='50' text-anchor='middle' fill='white'%3E📱%3C/text%3E%3C/svg%3E" />
    <link rel="stylesheet" href="../styles/carrito.css" />
  </head>

  <body>
    <header>
      <div class="header-inner">
        <div class="logo">
          <div class="logo-icon">📱</div>
          <h1>TechStore</h1>
        </div>
        <a href="../../index.html" class="back-btn">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
          </svg>
          Volver a la tienda
        </a>
      </div>
    </header>

    <main class="container">
      <div class="cart-header">
        <h1>Tu Carrito</h1>
        <p>Revisa tus productos antes de proceder al pago</p>
      </div>

      <div id="carrito" class="cart-content">
        <div id="lista-carrito" class="cart-items">
        </div>

        <div id="resumen-carrito" class="cart-summary" style="display: none;">
          <h3>Resumen del Pedido</h3>
          <div class="summary-row">
            <span>Productos (<span id="total-productos">0</span>)</span>
            <strong id="product-count">0</strong>
          </div>
          <div class="summary-row">
            <span>Subtotal</span>
            <strong>$<span id="importe-total">0</span></strong>
          </div>
          <div class="summary-row">
            <span>Envío</span>
            <strong>Gratis</strong>
          </div>
          <div class="summary-total">
            <span>Total</span>
            <strong>$<span id="importe-total-final">0</span></strong>
          </div>
          <button onclick="realizarCompra()" class="checkout-btn">
            <span>💳 Proceder al Pago</span>
          </button>
        </div>
      </div>
    </main>

    <footer>
      <p>© 2026 TechStore. Todos los derechos reservados.</p>
    </footer>

    <script src="../scripts/carrito.js"></script>
  </body>
</html>
